{{ define "schedules/create" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建赛程 - 赛事赛程管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {{ template "partials/header" . }}
    <div class="layout">
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <a href="/" class="nav-item">首页</a>
                <a href="/dashboard" class="nav-item">系统概览</a>
                <a href="/athletes" class="nav-item">运动员管理</a>
                <a href="/groups" class="nav-item">分组编排</a>
                <a href="/schedules" class="nav-item active">赛程排班</a>
                <a href="/scores" class="nav-item">成绩录入</a>
                <a href="/awards" class="nav-item">获奖档案</a>
                <a href="/venues" class="nav-item">场地管理</a>
            </nav>
        </aside>
        <main class="main-content">
            <div class="page-header">
                <h1>创建赛程</h1>
                <a href="/schedules" class="btn btn-outline">← 返回列表</a>
            </div>
            {{ if .Error }}
            <div class="alert alert-error">{{ .Error }}</div>
            {{ end }}
            <div class="card">
                <form method="POST" action="/schedules">
                    <div class="form-group">
                        <label for="group_id">选择分组</label>
                        <select id="group_id" name="group_id" required>
                            <option value="">请选择分组</option>
                            {{ range .Groups }}
                            <option value="{{ .ID }}">{{ .Name }} ({{ .Event }})</option>
                            {{ end }}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="venue_id">选择场地</label>
                        <select id="venue_id" name="venue_id" required>
                            <option value="">请选择场地</option>
                            {{ range .Venues }}
                            <option value="{{ .ID }}">{{ .Name }} ({{ .Location }}, 容量:{{ .Capacity }})</option>
                            {{ end }}
                        </select>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="start_time">开始时间</label>
                            <input type="datetime-local" id="start_time" name="start_time" required>
                        </div>
                        <div class="form-group">
                            <label for="end_time">结束时间</label>
                            <input type="datetime-local" id="end_time" name="end_time">
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">创建赛程</button>
                        <a href="/schedules" class="btn btn-outline">取消</a>
                    </div>
                </form>
            </div>
        </main>
    </div>
    {{ template "partials/footer" . }}
    <script src="/static/js/main.js"></script>
</body>
</html>
{{ end }}
